<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻网页试做</title>

  <!-- 使用外部样式设置（必须要有link标签作为连接） -->
  <!-- <link rel="stylesheet" href="css/news.css"> -->
   <style>
    /* 元素选择器 */
    /* span{
      color:rgb(178, 178, 178);
    } */

    /* 类选择器： */
       .cls{
        color:rgb(178, 178, 178);
      } 

    /* id选择器 */
     #idName{
      color:rgb(255, 0, 0);
    } 
    a{
      /* 去除超链接下方的下划线 */
      text-decoration: none;
    }


   </style>
</head>
<body>
  <h1>这是新闻标题</h1>
    <a href="http://www.cctv.com">央视网</a>
    <span class = "cls">2025年07月18日 09:22:08</span>
    <span id="idName">这是id选择器</span>
</body>
</html>
